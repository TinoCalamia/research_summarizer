prompts:
  - 'Please analyze the interview/meeting documents and provide a structured summary following these categories. For each question, provide the answer if available in the documents, or explicitly state if the question was not addressed. {{ query }}'

providers:
  - 'exec: python src/evaluation/rag_evaluator.py'

tests:
  - vars:
      query: "How is your Tech organization structured?"
    assert:
      - type: similar
        value: "N26 has about 1,500 total employees, with ~700 in Tech. The data team is relatively small compared to the overall Tech group."
        threshold: 0.8
      # - type: context-relevance
      #   threshold: 0.8
      - type: answer-relevance
        threshold: 0.7

  - vars:
      query: "How does your tech stack look like, and why were they chosen? How many are AI based?"
    assert:
      - type: similar
        value: "N26 has about 1,500 total employees, with ~700 in Tech. The data team is relatively small compared to the overall Tech group."
        threshold: 0.8